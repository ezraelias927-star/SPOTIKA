{% extends "admin1base.html" %}
{% block content %}
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col">
                <div class="table-responsive mt-5 shadow rounded">
                    <table class="table table-hover table-bordered">
                        <thead>
                            <tr>
                                <th>id</th>
                                <th>timuA</th>
                                <th>timuB</th>
                                <th>aina</th>
                                <th>odds</th>
                                <th>special</th>
                                <th>tarehe</th>
                                <th>update</th>
                                <th>delete</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for t in zote %}
                            <tr>
                                <td>{{ t.id }}</td>
                                <td>{{ t.timuA }}</td>
                                <td>{{ t.timuB }}</td>
                                <td>{{ t.aina }}</td>
                                <td>{{ t.odds }}</td>
                                <td>{{ t.special }}</td>
                                <td>{{ t.tarehe }}</td>
                                <td>
                                    <button type="button" data-bs-toggle="modal" data-bs-target="#mimi{{ t.id}}">update</button>
                                </td>
                                <td><a href="/delete/{{ t.id }}">delete</a></td>
                            </tr>
                            <div class="modal fade "  id="mimi{{ t.id }}">
                                <div class="modal-dialog">
                                    <div class="modal-content">
                                <form action="/update/{{ t.id}}" method="post">
    
                                    <input type="text" name="timuA" value="{{ t.timuA}}" class="form-control mb-3 mt-4 text-center">
                                    <input type="text" name="timuB" value="{{ t.timuB}}" class="form-control pw-3 mb-3 text-center">
                                    <input type="text" name="aina" value="{{ t.aina }}" class="form-control mb-3 text-center">
                                    <input type="number" step="any" name="odds" value="{{ t.odds }}" class="form-control mb-3 text-center">
                                    <input type="text" name="special" value="{{ t.special}}" class="form-control mb-3 text-center">
                                    <input type="text" name="tarehe" value="{{ t.tarehe}}" class="form-control mb-3 text-center">
                                    <button type="submit" class="form-control  text-center">update</button>
                                </form>
                                </div>
                                </div>
                            </div>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
{% endblock %}
