<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPOTIKA | {% block title %}{% endblock %}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            --primary-glow: #0d6efd;
            --dark-bg: #0f172a; /* Rangi ya kishua (Deep Charcoal) */
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--dark-bg);
            color: #e2e8f0;
            min-height: 100vh;
            /* Background Image ya "Kishua" yenye Giza */
            background-image: radial-gradient(circle at top right, rgba(13, 110, 253, 0.15), transparent),
                              url('https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=2070&auto=format&fit=crop');
            background-attachment: fixed;
            background-size: cover;
        }

        /* Glassmorphism Navbar */
        .navbar {
            background: rgba(15, 23, 42, 0.8) !important;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            transition: all 0.3s ease;
        }

        .navbar-brand {
            font-weight: 800;
            letter-spacing: 2px;
            color: #fff !important;
            text-shadow: 0 0 10px rgba(13, 110, 253, 0.5);
        }

        /* Active Link Styling (Ule "Unyama" wako wa Yellow lakini kwa Pro Level) */
        .nav-link {
            color: rgba(255, 255, 255, 0.7) !important;
            transition: 0.3s;
            position: relative;
            margin: 0 5px;
        }

        .nav-link.active {
            color: #ffeb3b !important; /* Yellow ya kishua */
            background: rgba(255, 235, 59, 0.1);
            border-radius: 8px;
        }

        .nav-link:hover {
            color: #fff !important;
            transform: translateY(-2px);
        }

        /* Offcanvas (Menu inayotokea kulia) */
        .offcanvas {
            background: rgba(15, 23, 42, 0.98) !important;
            backdrop-filter: blur(20px);
            border-left: 1px solid var(--glass-border);
            width: 300px !important;
        }

        .offcanvas-header {
            border-bottom: 1px solid var(--glass-border);
        }

        /* Animations */
        .fade-in {
            animation: fadeIn 0.8s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--dark-bg); }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary-glow); }
    </style>
    {% block styles %}{% endblock %}
</head>
<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg sticky-top p-3">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <i class="bi bi-rocket-takeoff-fill me-2 text-primary"></i>SPOTIKA
            </a>
            
            <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="offcanvas" data-bs-target="#ezraMenu">
                <i class="bi bi-grid-3x3-gap-fill text-white fs-2"></i>
            </button>

            <div class="collapse navbar-collapse d-none d-lg-block" id="desktopNav">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link px-3 {% if request.path=='/'%}active{%endif%}" href="/"><i class="bi bi-house-door-fill me-1"></i> HOME</a>
                    <a class="nav-link px-3 {% if request.path=='/register' %}active{% endif %}" href="/register"><i class="bi bi-person-plus-fill me-1"></i> JISAJILI</a>
                    <a class="nav-link px-3 {% if request.path=='/joins'%}active{% endif %}" href="/joins"><i class="bi bi-card-checklist me-1"></i> MACHAGUO</a>
                    <a class="nav-link px-3 {% if request.path=='/spec'%}active{%endif%}" href="/spec"><i class="bi bi-star-fill me-1"></i> SPECIAL TIPS</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="offcanvas offcanvas-end text-white" tabindex="-1" id="ezraMenu">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title fw-bold"><i class="bi bi-rocket-takeoff text-primary me-2"></i>SPOTIKA MENU</h5>
            <button type="button" class="btn-close btn-close-white shadow-none" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body pt-4">
            <div class="navbar-nav">
                <a class="nav-link py-3 mb-2 px-3 {% if request.path=='/'%}active{%endif%}" href="/"><i class="bi bi-house-door me-3"></i>HOME</a>
                <a class="nav-link py-3 mb-2 px-3 {% if request.path=='/register' %}active{% endif %}" href="/register"><i class="bi bi-person-plus me-3"></i>JISAJILI</a>
                <a class="nav-link py-3 mb-2 px-3 {% if request.path=='/joins'%}active{% endif %}" href="/joins"><i class="bi bi-card-checklist me-3"></i>ANGALIA MACHAGUO</a>
                <a class="nav-link py-3 mb-2 px-3 {% if request.path=='/spec'%}active{%endif%}" href="/spec"><i class="bi bi-lightning-charge me-3"></i>SPECIAL TIPS</a>
            </div>
            
            <div class="mt-5 p-3 rounded" style="background: var(--glass-bg);">
                <small class="text-secondary d-block mb-2">Developed By:</small>
                <p class="fw-bold text-primary m-0"><i class="bi bi-patch-check-fill me-2"></i>Engineer Ezra</p>
            </div>
        </div>
    </div>

    <div class="container py-5 fade-in">
        {% block content %}
        {% endblock %}
    </div>

    <footer class="mt-auto py-4 text-center border-top border-secondary border-opacity-10">
        <div class="container">
            <span class="text-secondary opacity-50 small">&copy; 2026 SPOTIKA SYSTEM | All Rights Reserved</span>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    {% block scripts %}
    {% endblock %}
</body>
</html>
